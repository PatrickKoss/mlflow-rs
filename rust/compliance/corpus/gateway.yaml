# Plan §12.8 - AI Gateway CRUD. Secret read responses contain only Python's
# masked value shape; encrypted/plaintext bytes are never recorded.
cases:
  - name: gateway_supported_providers
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/supported-providers
    expect_status: 200

  - name: gateway_supported_models_openai
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/supported-models
    query: {provider: openai}
    expect_status: 200

  - name: gateway_supported_models_gemini
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/supported-models
    query: {provider: gemini}
    expect_status: 200

  - name: gateway_supported_models_vertex_ai
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/supported-models
    query: {provider: vertex_ai}
    expect_status: 200

  - name: gateway_supported_models_fireworks_ai
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/supported-models
    query: {provider: fireworks_ai}
    expect_status: 200

  - name: gateway_supported_models_empty_filter
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/supported-models
    query: {provider: does-not-exist}
    expect_status: 200

  - name: gateway_provider_config
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/provider-config
    query: {provider: openai}
    expect_status: 200

  - name: gateway_provider_config_missing_provider
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/provider-config
    expect_status: 400

  - name: gateway_secrets_config
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/secrets/config
    expect_status: 200

  # With MLFLOW_DEPLOYMENTS_TARGET unset, Python returns the empty service
  # before reading or validating either request shape.
  - name: gateway_proxy_empty_target_get
    method: GET
    path: /ajax-api/2.0/mlflow/gateway-proxy
    query: {gateway_path: deliberately-invalid}
    expect_status: 200

  - name: gateway_proxy_empty_target_post
    method: POST
    path: /ajax-api/2.0/mlflow/gateway-proxy
    raw_body: deliberately-not-json
    expect_status: 200

  - name: gateway_create_secret_masked
    method: POST
    path: /api/3.0/mlflow/gateway/secrets/create
    body:
      secret_name: corpus-obvious-fake-secret
      secret_value: {api_key: obvious-fake-corpus-value-1234}
      provider: openai
      auth_config: {auth_mode: api_key}
      created_by: corpus-user
    bind:
      - {bind: gateway_secret_id, from: "$.secret.secret_id"}
    expect_status: 200

  - name: gateway_get_secret_masked
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/secrets/get
    query: {secret_id: "${gateway_secret_id}"}
    expect_status: 200

  - name: gateway_list_secrets_masked
    method: GET
    path: /api/3.0/mlflow/gateway/secrets/list
    query: {provider: openai}
    expect_status: 200

  - name: gateway_update_secret_masked
    method: POST
    path: /ajax-api/3.0/mlflow/gateway/secrets/update
    body:
      secret_id: "${gateway_secret_id}"
      secret_value: {api_key: rotated-obvious-fake-value-5678}
      updated_by: corpus-user
    expect_status: 200

  - name: gateway_create_model_definition
    method: POST
    path: /api/3.0/mlflow/gateway/model-definitions/create
    body:
      name: corpus-fake-model-definition
      secret_id: "${gateway_secret_id}"
      provider: openai
      model_name: corpus-fake-model
      created_by: corpus-user
    bind:
      - {bind: gateway_model_definition_id, from: "$.model_definition.model_definition_id"}
    expect_status: 200

  - name: gateway_get_model_definition
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/model-definitions/get
    query: {model_definition_id: "${gateway_model_definition_id}"}
    expect_status: 200

  - name: gateway_list_model_definitions
    method: GET
    path: /api/3.0/mlflow/gateway/model-definitions/list
    query: {provider: openai, secret_id: "${gateway_secret_id}"}
    expect_status: 200

  - name: gateway_update_model_definition
    method: POST
    path: /ajax-api/3.0/mlflow/gateway/model-definitions/update
    body:
      model_definition_id: "${gateway_model_definition_id}"
      model_name: corpus-fake-model-updated
      updated_by: corpus-user
    expect_status: 200

  - name: gateway_create_endpoint
    method: POST
    path: /api/3.0/mlflow/gateway/endpoints/create
    body:
      name: corpus-fake-endpoint
      model_configs:
        - model_definition_id: "${gateway_model_definition_id}"
          linkage_type: PRIMARY
          weight: 1.0
      routing_strategy: REQUEST_BASED_TRAFFIC_SPLIT
      usage_tracking: false
      created_by: corpus-user
    bind:
      - {bind: gateway_endpoint_id, from: "$.endpoint.endpoint_id"}
    expect_status: 200

  - name: gateway_get_endpoint
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/endpoints/get
    query: {endpoint_id: "${gateway_endpoint_id}"}
    expect_status: 200

  - name: gateway_update_endpoint
    method: POST
    path: /api/3.0/mlflow/gateway/endpoints/update
    body:
      endpoint_id: "${gateway_endpoint_id}"
      name: corpus-fake-endpoint-updated
      model_configs:
        - model_definition_id: "${gateway_model_definition_id}"
          linkage_type: PRIMARY
          weight: 1.0
      routing_strategy: REQUEST_BASED_TRAFFIC_SPLIT
      usage_tracking: false
      updated_by: corpus-user
    expect_status: 200

  - name: gateway_set_endpoint_tag
    method: POST
    path: /api/3.0/mlflow/gateway/endpoints/set-tag
    body: {endpoint_id: "${gateway_endpoint_id}", key: corpus, value: parity}
    expect_status: 200

  - name: gateway_delete_endpoint_tag
    method: DELETE
    path: /ajax-api/3.0/mlflow/gateway/endpoints/delete-tag
    body: {endpoint_id: "${gateway_endpoint_id}", key: corpus}
    expect_status: 200

  - name: gateway_create_secondary_model_definition
    method: POST
    path: /api/3.0/mlflow/gateway/model-definitions/create
    body:
      name: corpus-fake-secondary-model-definition
      secret_id: "${gateway_secret_id}"
      provider: openai
      model_name: corpus-fake-secondary-model
      created_by: corpus-user
    bind:
      - {bind: gateway_secondary_model_definition_id, from: "$.model_definition.model_definition_id"}
    expect_status: 200

  - name: gateway_attach_model
    method: POST
    path: /ajax-api/3.0/mlflow/gateway/endpoints/models/attach
    body:
      endpoint_id: "${gateway_endpoint_id}"
      model_config:
        model_definition_id: "${gateway_secondary_model_definition_id}"
        linkage_type: FALLBACK
        weight: 0.0
        fallback_order: 1
      created_by: corpus-user
    expect_status: 200

  - name: gateway_detach_model
    method: POST
    path: /api/3.0/mlflow/gateway/endpoints/models/detach
    body:
      endpoint_id: "${gateway_endpoint_id}"
      model_definition_id: "${gateway_secondary_model_definition_id}"
    expect_status: 200

  - name: gateway_create_endpoint_binding
    method: POST
    path: /ajax-api/3.0/mlflow/gateway/endpoints/bindings/create
    body:
      endpoint_id: "${gateway_endpoint_id}"
      resource_type: scorer
      resource_id: corpus-bound-scorer
      created_by: corpus-user
    expect_status: 200

  - name: gateway_list_endpoint_bindings
    method: GET
    path: /api/3.0/mlflow/gateway/endpoints/bindings/list
    query: {endpoint_id: "${gateway_endpoint_id}", resource_type: scorer}
    expect_status: 200

  - name: gateway_delete_endpoint_binding
    method: DELETE
    path: /ajax-api/3.0/mlflow/gateway/endpoints/bindings/delete
    body:
      endpoint_id: "${gateway_endpoint_id}"
      resource_type: scorer
      resource_id: corpus-bound-scorer
    expect_status: 200

  - name: gateway_register_guardrail_scorer
    method: POST
    path: /api/3.0/mlflow/scorers/register
    body:
      experiment_id: "0"
      name: corpus-guardrail-scorer
      serialized_scorer: '{"name":"corpus-guardrail-scorer","instructions_judge_pydantic_data":{"instructions":"Evaluate {{ inputs }}","model":"openai:/fixture"}}'
    bind:
      - {bind: gateway_guardrail_scorer_id, from: "$.scorer_id"}
      - {bind: gateway_guardrail_scorer_version, from: "$.version"}
    expect_status: 200

  - name: gateway_create_guardrail
    method: POST
    path: /ajax-api/3.0/mlflow/gateway/guardrails/create
    body:
      name: corpus-input-guardrail
      scorer_id: "${gateway_guardrail_scorer_id}"
      scorer_version: "${gateway_guardrail_scorer_version}"
      stage: BEFORE
      action: VALIDATION
    bind:
      - {bind: gateway_guardrail_id, from: "$.guardrail.guardrail_id"}
    expect_status: 200

  - name: gateway_get_guardrail
    method: GET
    path: /api/3.0/mlflow/gateway/guardrails/get
    query: {guardrail_id: "${gateway_guardrail_id}"}
    expect_status: 200

  - name: gateway_list_guardrails
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/guardrails/list
    query: {max_results: 10}
    expect_status: 200

  - name: gateway_add_guardrail_to_endpoint
    method: POST
    path: /api/3.0/mlflow/gateway/guardrails/add-to-endpoint
    body:
      endpoint_id: "${gateway_endpoint_id}"
      guardrail_id: "${gateway_guardrail_id}"
      execution_order: 1
    expect_status: 200

  - name: gateway_list_guardrails_for_endpoint
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/guardrails/list-for-endpoint
    query: {endpoint_id: "${gateway_endpoint_id}"}
    expect_status: 200

  - name: gateway_update_guardrail_config
    method: PATCH
    path: /api/3.0/mlflow/gateway/guardrails/update-config
    body:
      endpoint_id: "${gateway_endpoint_id}"
      guardrail_id: "${gateway_guardrail_id}"
      execution_order: 2
    expect_status: 200

  - name: gateway_remove_guardrail_from_endpoint
    method: DELETE
    path: /ajax-api/3.0/mlflow/gateway/guardrails/remove-from-endpoint
    body: {endpoint_id: "${gateway_endpoint_id}", guardrail_id: "${gateway_guardrail_id}"}
    expect_status: 200

  - name: gateway_delete_guardrail
    method: DELETE
    path: /api/3.0/mlflow/gateway/guardrails/delete
    body: {guardrail_id: "${gateway_guardrail_id}"}
    expect_status: 200

  - name: gateway_list_endpoints
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/endpoints/list
    query: {provider: openai}
    expect_status: 200

  - name: gateway_delete_endpoint
    method: DELETE
    path: /api/3.0/mlflow/gateway/endpoints/delete
    body: {endpoint_id: "${gateway_endpoint_id}"}
    expect_status: 200

  - name: gateway_delete_model_definition
    method: DELETE
    path: /ajax-api/3.0/mlflow/gateway/model-definitions/delete
    body: {model_definition_id: "${gateway_model_definition_id}"}
    expect_status: 200

  - name: gateway_delete_secondary_model_definition
    method: DELETE
    path: /api/3.0/mlflow/gateway/model-definitions/delete
    body: {model_definition_id: "${gateway_secondary_model_definition_id}"}
    expect_status: 200

  - name: gateway_delete_secret
    method: DELETE
    path: /api/3.0/mlflow/gateway/secrets/delete
    body: {secret_id: "${gateway_secret_id}"}
    expect_status: 200

  - name: gateway_create_budget_policy
    method: POST
    path: /api/3.0/mlflow/gateway/budgets/create
    body:
      budget_unit: USD
      budget_amount: 25.5
      duration: {unit: DAYS, value: 1}
      target_scope: WORKSPACE
      budget_action: ALERT
      created_by: corpus-user
    bind:
      - {bind: gateway_budget_policy_id, from: "$.budget_policy.budget_policy_id"}
    expect_status: 200

  - name: gateway_get_budget_policy
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/budgets/get
    query: {budget_policy_id: "${gateway_budget_policy_id}"}
    expect_status: 200

  - name: gateway_update_budget_policy
    method: POST
    path: /api/3.0/mlflow/gateway/budgets/update
    body:
      budget_policy_id: "${gateway_budget_policy_id}"
      budget_amount: 30.0
      duration: {unit: HOURS, value: 12}
      budget_action: REJECT
      updated_by: corpus-user
    expect_status: 200

  - name: gateway_list_budget_policies
    method: GET
    path: /ajax-api/3.0/mlflow/gateway/budgets/list
    query: {max_results: 10}
    expect_status: 200

  - name: gateway_list_budget_windows
    method: GET
    path: /api/3.0/mlflow/gateway/budgets/windows
    normalize:
      extra_timestamp_fields: [window_start_ms, window_end_ms]
    expect_status: 200

  - name: gateway_delete_budget_policy
    method: DELETE
    path: /ajax-api/3.0/mlflow/gateway/budgets/delete
    body: {budget_policy_id: "${gateway_budget_policy_id}"}
    expect_status: 200

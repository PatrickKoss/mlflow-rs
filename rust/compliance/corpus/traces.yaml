# Section 3.6 Tracing V3 (start/end/search-walk/tag) + 3.8 one OTLP ingest smoke
# + 3.7 V2 deprecated search smoke.
cases:
  - name: traces_setup_experiment
    method: POST
    path: /api/2.0/mlflow/experiments/create
    body: {name: traces_exp}
    bind:
      - {bind: traces_exp, from: "$.experiment_id"}

  - name: trace_start_v3
    method: POST
    path: /api/3.0/mlflow/traces
    body:
      trace:
        trace_info:
          trace_id: tr-compliance-1
          trace_location:
            type: MLFLOW_EXPERIMENT
            mlflow_experiment: {experiment_id: "${traces_exp}"}
          request_time: "1000"
          execution_duration_ms: "5"
          state: OK
    normalize:
      # artifactLocation tag holds an absolute per-server path.
      drop_paths: ["$.trace.trace_info.tags"]

  - name: trace_get_info_v3
    method: GET
    path: /api/3.0/mlflow/traces/tr-compliance-1/info
    normalize:
      drop_paths: ["$.trace.trace_info.tags", "$.trace_info.tags"]

  - name: trace_start_v3_with_assessment
    method: POST
    path: /api/3.0/mlflow/traces
    body:
      trace:
        trace_info:
          trace_id: tr-compliance-assessment
          trace_location:
            type: MLFLOW_EXPERIMENT
            mlflow_experiment: {experiment_id: "${traces_exp}"}
          request_time: "2024-01-01T00:00:00Z"
          state: OK
          assessments:
            - assessment_id: a-compliance-embedded
              assessment_name: expected_answer
              source: {source_type: CODE, source_id: compliance}
              create_time: "2024-01-01T00:00:01Z"
              last_update_time: "2024-01-01T00:00:02Z"
              expectation: {value: MLflow}
              metadata: {suite: traces}
    normalize:
      drop_paths: ["$.trace.trace_info.tags"]

  - name: trace_get_info_v3_with_assessment
    method: GET
    path: /api/3.0/mlflow/traces/tr-compliance-assessment
    normalize:
      drop_paths: ["$.trace.trace_info.tags", "$.trace_info.tags"]

  - name: trace_otlp_rollup_parent_token_usage
    method: POST
    path: /v1/traces
    headers:
      content-type: application/json
      x-mlflow-experiment-id: "${traces_exp}"
    raw_body: >-
      {"resourceSpans":[{"scopeSpans":[{"spans":[
      {"traceId":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa","spanId":"0101010101010101","name":"agent","startTimeUnixNano":"1000000000","endTimeUnixNano":"2000000000","status":{"code":"STATUS_CODE_OK"},"attributes":[{"key":"mlflow.chat.tokenUsage","value":{"stringValue":"{\"input_tokens\":120,\"output_tokens\":15,\"total_tokens\":135}"}}]},
      {"traceId":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa","spanId":"1010101010101010","parentSpanId":"0101010101010101","name":"llm-1","startTimeUnixNano":"1100000000","endTimeUnixNano":"1200000000","status":{"code":"STATUS_CODE_OK"},"attributes":[{"key":"mlflow.chat.tokenUsage","value":{"stringValue":"{\"input_tokens\":40,\"output_tokens\":5,\"total_tokens\":45}"}}]},
      {"traceId":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa","spanId":"1111111111111111","parentSpanId":"0101010101010101","name":"llm-2","startTimeUnixNano":"1300000000","endTimeUnixNano":"1400000000","status":{"code":"STATUS_CODE_OK"},"attributes":[{"key":"mlflow.chat.tokenUsage","value":{"stringValue":"{\"input_tokens\":40,\"output_tokens\":5,\"total_tokens\":45}"}}]},
      {"traceId":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa","spanId":"1212121212121212","parentSpanId":"0101010101010101","name":"llm-3","startTimeUnixNano":"1500000000","endTimeUnixNano":"1600000000","status":{"code":"STATUS_CODE_OK"},"attributes":[{"key":"mlflow.chat.tokenUsage","value":{"stringValue":"{\"input_tokens\":40,\"output_tokens\":5,\"total_tokens\":45}"}}]}
      ]}]}]}
    expect_status: 200
    compare_body: false

  - name: trace_get_otlp_rollup_parent_token_usage
    method: GET
    path: /api/3.0/mlflow/traces/tr-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    normalize:
      drop_paths: ["$.trace.trace_info.tags", "$.trace_info.tags"]

  - name: trace_set_tag_v3
    method: POST
    path: /api/3.0/mlflow/traces/tr-compliance-1/tags
    body: {key: quality, value: high}

  - name: trace_search_v3
    method: POST
    path: /api/3.0/mlflow/traces/search
    body:
      locations: [{type: MLFLOW_EXPERIMENT, mlflow_experiment: {experiment_id: "${traces_exp}"}}]
      max_results: 100
    normalize:
      drop_paths: ["$.traces"]

  - name: trace_start_v3_second
    method: POST
    path: /api/3.0/mlflow/traces
    body:
      trace:
        trace_info:
          trace_id: tr-compliance-2
          trace_location:
            type: MLFLOW_EXPERIMENT
            mlflow_experiment: {experiment_id: "${traces_exp}"}
          request_time: "2000"
          execution_duration_ms: "7"
          state: OK
    normalize:
      drop_paths: ["$.trace.trace_info.tags"]

  - name: trace_search_v3_walk
    method: POST
    path: /api/3.0/mlflow/traces/search
    body:
      locations: [{type: MLFLOW_EXPERIMENT, mlflow_experiment: {experiment_id: "${traces_exp}"}}]
      max_results: 1
    walk:
      token_field: next_page_token
      token_param: page_token
      max_pages: 10
    normalize:
      drop_paths: ["$.traces"]

  - name: trace_delete_tag_v3
    method: DELETE
    path: /api/3.0/mlflow/traces/tr-compliance-1/tags
    query: {key: quality}

  - name: trace_search_v2_deprecated
    method: GET
    path: /api/2.0/mlflow/traces
    query: {experiment_ids: "${traces_exp}", max_results: 100}
    normalize:
      drop_paths: ["$.traces"]

  # ---- Errors ----
  - name: trace_get_info_missing
    method: GET
    path: /api/3.0/mlflow/traces/tr-does-not-exist/info
    expect_status: 404

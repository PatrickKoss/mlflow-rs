services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow-soak
    ports:
      - "55439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - soak-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "59090:9000"
      - "59091:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - soak-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set soak http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing soak/mlflow-soak

volumes:
  soak-postgres:
  soak-minio:

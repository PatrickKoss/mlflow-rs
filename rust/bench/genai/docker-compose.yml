services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow-genai-fake
    ports:
      - "55440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - genai-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio-fake-access
      MINIO_ROOT_PASSWORD: minio-fake-secret
    ports:
      - "59092:9000"
      - "59093:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - genai-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set bench http://minio:9000 minio-fake-access minio-fake-secret &&
        mc mb --ignore-existing bench/mlflow-genai-bench

volumes:
  genai-postgres:
  genai-minio:

# Published-image variant of the all-Rust reference deployment.
# Run from this directory with:
#   docker compose -f docker-compose.release.yml up -d --wait

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET:-mlflow}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MLFLOW_S3_BUCKET"
    restart: "no"

  # Alembic remains the schema owner. This Python container is a one-shot init
  # job only; it exits before the Python-free Rust serving plane starts.
  migrate:
    image: ghcr.io/mlflow/mlflow@sha256:73365f742d67ef9e59e50118010bf14ff825a157c8244051baea887b8587e772
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../mlflow/store/db_migrations/versions:/cutover-migrations:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        migration_dir="$$(python -c 'import mlflow.store.db_migrations, os; print(os.path.join(os.path.dirname(mlflow.store.db_migrations.__file__), "versions"))')";
        cp /cutover-migrations/*.py "$$migration_dir/";
        exec mlflow db upgrade postgresql://mlflow:mlflow@postgres:5432/mlflow
    restart: "no"

  rust:
    image: ${MLFLOW_RUST_IMAGE:-ghcr.io/patrickkoss/mlflow-rust:${MLFLOW_RUST_VERSION:-latest}}
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_IGNORE_TLS: "true"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://mlflow:mlflow@postgres:5432/mlflow
      - --serve-artifacts
      - --artifacts-destination
      - s3://${MLFLOW_S3_BUCKET:-mlflow}
      - --default-artifact-root
      - mlflow-artifacts:/
    volumes:
      - artifacts:/mlartifacts
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  nginx:
    image: ${MLFLOW_RUST_UI_IMAGE:-ghcr.io/patrickkoss/mlflow-rust-ui:${MLFLOW_RUST_VERSION:-latest}}
    depends_on:
      rust:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  artifacts:
  minio-data:

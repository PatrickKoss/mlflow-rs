# MLflow reference reverse-proxy config (RUST_TRACKING_SERVER_PLAN.md T22.4 / §2.2).
#
# Routing contract: every API and server-rendered route goes to Rust. nginx
# serves only the React shell and its hashed static assets directly.
#
# Attribution: every response carries `X-MLflow-Backend: rust|static` so
# `smoke.sh` can assert the Python serving plane is absent. `add_header ... always`
# emits the header even on 4xx/5xx.
#
# The React build dir is bind-mounted read-only at `/usr/share/mlflow-ui` (see
# docker-compose.yml). Populate `mlflow/server/js/build/` before starting the
# stack; missing assets fail closed instead of falling back to another runtime.

upstream rust_backend {
    server rust:5000;
}

# Log which upstream + backend tag served each request (attribution via access log).
log_format  attribution  '$remote_addr "$request" $status '
                          'upstream=$upstream_addr backend=$sent_http_x_mlflow_backend';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log attribution;

    # Artifact uploads (proxied artifact plane) can be large. `0` = unlimited,
    # matching MLflow's application default.
    client_max_body_size 0;

    # ---- Rust streaming routes ------------------------------------------
    # These routes would also reach Rust through the default location, but keep
    # explicit locations for the transport settings that prevent nginx from
    # buffering SSE/chunked responses.

    # Assistant SSE stream (chat panel).
    location ~ ^/ajax-api/3\.0/mlflow/assistant(/|$) {
        proxy_pass http://rust_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MLFLOW-WORKSPACE $http_x_mlflow_workspace;
        add_header X-MLflow-Backend rust always;
    }

    # Gateway streaming proxy.
    location ~ ^/gateway(/|$) {
        proxy_pass http://rust_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MLFLOW-WORKSPACE $http_x_mlflow_workspace;
        add_header X-MLflow-Backend rust always;
    }

    location = /ajax-api/2.0/mlflow/gateway-proxy {
        proxy_pass http://rust_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MLFLOW-WORKSPACE $http_x_mlflow_workspace;
        add_header X-MLflow-Backend rust always;
    }

    # Scorer invoke can stream evaluator progress.
    location ~ ^/(api|ajax-api)/3\.0/mlflow/scorer/invoke$ {
        proxy_pass http://rust_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MLFLOW-WORKSPACE $http_x_mlflow_workspace;
        add_header X-MLflow-Backend rust always;
    }

    # ---- Static UI -------------------------------------------------------
    # Hashed JS/CSS bundles: cache for 28 days, matching MLflow's historical
    # static handler. The UI build is required; missing files return 404.
    location ~ ^/static-files/(.+)$ {
        set $static_files_path $1;
        root /usr/share/mlflow-ui;
        try_files /$static_files_path =404;
        add_header X-MLflow-Backend static always;
        add_header Cache-Control "public, max-age=2419200" always;
    }

    # SPA shell: force revalidation so it never points at stale hashed assets.
    location = / {
        root /usr/share/mlflow-ui;
        try_files /index.html =503;
        add_header X-MLflow-Backend static always;
        add_header Cache-Control "no-cache" always;
    }

    # ---- Rust (everything else) -----------------------------------------
    # Covers tracking, tracing, GenAI, gateway, jobs, PromptLab, metrics,
    # artifacts, registry, webhooks, GraphQL, auth/RBAC, workspaces, and ops.
    location / {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # nginx forwards arbitrary request headers by default; keep the
        # workspace selector explicit because it is part of MLflow's contract.
        proxy_set_header X-MLFLOW-WORKSPACE $http_x_mlflow_workspace;
        add_header X-MLflow-Backend rust always;
    }
}

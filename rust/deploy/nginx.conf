# MLflow reference reverse-proxy config (RUST_TRACKING_SERVER_PLAN.md T11.3 / §2.2).
#
# Routing contract: "default -> Rust, genai -> Python".
#   * The Rust tracking server handles everything: tracking, tracing, OTLP,
#     metrics, artifacts, registry, webhooks, graphql, users/roles/permissions,
#     workspaces, server-info, health/version/metrics.
#   * The Python server handles ONLY the genai / gateway / jobs surface that the
#     Rust port does not implement (see the `location` blocks below).
#
# Attribution: every proxied response carries `X-MLflow-Backend: rust|python` so
# `smoke.sh` can assert which upstream served a request. `add_header ... always`
# emits the header even on 4xx/5xx (a Python 404/501 still attributes to python).

upstream rust_backend {
    server rust:5000;
}

upstream python_backend {
    server python:5001;
}

# Log which upstream + backend tag served each request (attribution via access log).
log_format  attribution  '$remote_addr "$request" $status '
                          'upstream=$upstream_addr backend=$sent_http_x_mlflow_backend';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log attribution;

    # Artifact uploads (proxied artifact plane) can be large; disable the body
    # size cap on the artifact paths. Python enforces no app-level cap either
    # (`MAX_CONTENT_LENGTH` unset), so `0` = unlimited mirrors the app default.
    client_max_body_size 0;

    # ---- Python (genai / gateway / jobs) --------------------------------
    # These are the ONLY routes that leave Rust. Derived from plan §2.2.
    # Each block tags `X-MLflow-Backend: python`. `proxy_buffering off` is set on
    # the SSE / streaming locations so tokens flush to the client immediately.

    # genai + gateway family under 3.0 on both /api and /ajax-api prefixes:
    # {gateway,scorers,datasets,issues,genai,label-schemas,review-queues}
    location ~ ^/(api|ajax-api)/3\.0/mlflow/(gateway|scorers|datasets|issues|genai|label-schemas|review-queues)(/|$) {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    # Assistant SSE stream (chat panel) — streaming, buffering OFF.
    location ~ ^/ajax-api/3\.0/mlflow/assistant(/|$) {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    # Jobs API.
    location ~ ^/ajax-api/3\.0/jobs(/|$) {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    # Gateway proxy + gateway streaming — streaming, buffering OFF.
    location ~ ^/gateway(/|$) {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    location = /ajax-api/2.0/mlflow/gateway-proxy {
        proxy_pass http://python_backend;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    # PromptLab run creation (genai authoring).
    location = /ajax-api/2.0/mlflow/runs/create-promptlab-run {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    # Scorer invoke (genai eval) on both prefixes.
    location ~ ^/(api|ajax-api)/3\.0/mlflow/scorer/invoke$ {
        proxy_pass http://python_backend;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MLflow-Backend python always;
    }

    # Ops health for the Python container, exposed as /python/health.
    location = /python/health {
        rewrite ^/python/health$ /health break;
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        add_header X-MLflow-Backend python always;
    }

    # ---- Static UI ------------------------------------------------------
    # T11.4: the frontend split will serve `mlflow/server/js/build/` directly
    # from nginx (with cache headers). For THIS task, the React bundle and
    # index.html are proxied to the Python container, which ships the build.
    location = / {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        add_header X-MLflow-Backend python always;
    }
    location /static-files/ {
        proxy_pass http://python_backend;
        proxy_set_header Host $host;
        add_header X-MLflow-Backend python always;
    }

    # ---- Rust (everything else) -----------------------------------------
    # Default rule from §2.2: any path not matched above goes to Rust. This
    # covers tracking, runs, metrics, tracing, OTLP `/v1/traces`, artifacts
    # (`/get-artifact`, `/model-versions/get-artifact`, `/mlflow-artifacts/*`,
    # `/ajax-api/2.0/mlflow/upload-artifact`), logged models, registry,
    # webhooks, `/graphql`, users/roles/permissions, `/signup`, workspaces,
    # `server-info`, ui-telemetry, `/health`, `/version`, `/metrics`.
    location / {
        proxy_pass http://rust_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve the workspace selector header (`X-MLFLOW-WORKSPACE`) — nginx
        # forwards arbitrary request headers by default; listed here for clarity.
        proxy_set_header X-MLFLOW-WORKSPACE $http_x_mlflow_workspace;
        add_header X-MLflow-Backend rust always;
    }
}

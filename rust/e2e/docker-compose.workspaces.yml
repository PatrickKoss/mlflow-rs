services:
  rust:
    command:
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://mlflow:mlflow@postgres:5432/mlflow
      - --serve-artifacts
      - --artifacts-destination
      - /mlartifacts
      - --default-artifact-root
      - /mlartifacts
      - --enable-workspaces

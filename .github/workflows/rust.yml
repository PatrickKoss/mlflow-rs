name: Rust

on:
  push:
    paths:
      - "rust/**"
      - "mlflow/**"
      - ".github/workflows/rust.yml"
    branches:
      - master
      - branch-[0-9]+.[0-9]+
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "rust/**"
      - "mlflow/**"
      - ".github/workflows/rust.yml"
  # Nightly soak for the concurrency/chaos test (job `chaos`, plan T12.6),
  # which is too heavy for the PR path. `workflow_dispatch` allows ad-hoc runs.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: rust

permissions: {}

jobs:
  fmt:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
          components: clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - name: Build workspace
        run: cargo build --workspace

  test:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - name: Run tests
        run: cargo test --workspace

  # Runs the SQLite-authored mlflow-store/mlflow-registry integration suites a
  # second time against live Postgres/MySQL service containers (plan T2.2):
  # mlflow-test-support's `TempDb` truncates + re-seeds the shared,
  # already-migrated schema before every test rather than copying a fixture
  # file, so the exact same test bodies exercise all three dialects. Schema
  # provisioning uses the real `mlflow db upgrade` (Rust never migrates, see
  # `mlflow-store::db`), mirroring `tests/db/check_migration.sh`.
  dialect-matrix:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dialect: [postgres, mysql]
        include:
          - dialect: postgres
            uri: postgresql://mlflow:mlflow@localhost:5432/mlflow
          - dialect: mysql
            uri: mysql://mlflow:mlflow@localhost:3306/mlflow?charset=utf8mb4
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mlflow
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U mlflow -d mlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: mlflow
          MYSQL_USER: mlflow
          MYSQL_PASSWORD: mlflow
          MYSQL_ROOT_PASSWORD: root
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u mlflow -pmlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - uses: ./.github/actions/setup-python
      - name: Provision schema (mlflow db upgrade)
        working-directory: .
        env:
          DB_URI: ${{ matrix.uri }}
        run: uv run --extra db mlflow db upgrade "$DB_URI"
      - name: Run store/registry suites against live dialect
        env:
          MLFLOW_RUST_TEST_DIALECT: ${{ matrix.dialect }}
          MLFLOW_RUST_TEST_PG_URI: postgresql://mlflow:mlflow@localhost:5432/mlflow
          MLFLOW_RUST_TEST_MYSQL_URI: mysql://mlflow:mlflow@localhost:3306/mlflow?charset=utf8mb4
        # TempDb truncates the whole shared schema per test (see
        # mlflow-test-support), so the live-dialect runs must be serial;
        # unaffected suites (e.g. differential corpus tests, which keep their
        # own private SQLite fixture) run fine interleaved at --test-threads=1
        # too, just without the parallelism they'd get by default.
        run: cargo test -p mlflow-store -p mlflow-registry -- --test-threads=1

  # T12.5 compliance CI matrix: runs the T12.4 differential replay harness
  # (rust/compliance/replay.py) — dual-boots the Python and Rust
  # `mlflow-server`, replays the request corpus against both, and diffs.
  #
  # GATING: REQUIRED. T12.4 drove the full 133-case corpus to zero
  # non-allowlisted diffs / zero status mismatches on sqlite (2026-07-17: the
  # harness boot gaps were fixed — auth app factory + artifact-proxy env —
  # and the remaining genuine divergences were fixed on the Rust side,
  # chiefly the lenient ParseDict-parity request parsing; the 11 tolerated
  # diffs are documented in rust/compliance/allowlist.yaml). A non-zero exit
  # here now means a real wire-parity regression: read the uploaded report
  # artifact, fix the divergence (or, for a consciously accepted one, add a
  # reasoned allowlist entry) — never disable sections to fake green.
  #
  # DIALECT COVERAGE: `rust/compliance/replay.py` only seeds/boots SQLite
  # today (`_seed_tracking_db`, `DualServers.__enter__` both hardcode
  # `sqlite:///...` URIs; there is no dialect switch like
  # `MLFLOW_RUST_TEST_DIALECT` in the T2.2 dialect-matrix job). Postgres/MySQL
  # service containers are still brought up here (mirroring dialect-matrix)
  # so the job is READY the moment replay.py grows dialect support, but today
  # they are unused by replay.py itself.
  # TODO(T12.5): once replay.py supports seeding/booting against
  # MLFLOW_RUST_TEST_PG_URI / MLFLOW_RUST_TEST_MYSQL_URI, run it once per
  # dialect here instead of sqlite-only.
  compliance:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false || github.event.pull_request.user.login == 'Copilot' && github.event.pull_request.user.type == 'Bot')
    permissions:
      contents: read
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mlflow
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U mlflow -d mlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: mlflow
          MYSQL_USER: mlflow
          MYSQL_PASSWORD: mlflow
          MYSQL_ROOT_PASSWORD: root
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u mlflow -pmlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - name: Build mlflow-server
        run: cargo build -p mlflow-server
      - uses: ./.github/actions/setup-python
      - name: Install Python mlflow with auth + db extras
        working-directory: .
        # `auth` -> flask-wtf, needed for the `auth` corpus section's
        # basic-auth server boot. `db` -> psycopg2-binary/PyMySQL/pymssql,
        # kept available for when replay.py gains dialect support (see
        # TODO above); unused by the sqlite-only run today.
        run: uv sync --extra auth --extra db
      - name: Run differential replay harness (sqlite)
        working-directory: .
        env:
          MLFLOW_RUST_SERVER_BIN: ${{ github.workspace }}/rust/target/debug/mlflow-server
        # Gated: a non-zero exit is a wire-parity regression (see the
        # job-level GATING comment above).
        run: uv run --no-sync python rust/compliance/replay.py
      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: compliance-report
          path: rust/compliance/report/
          if-no-files-found: warn

  # Concurrency/chaos soak (plan T12.6): boots the full axum server in-process
  # against a live Postgres schema and hammers it with 10k mixed ops
  # (`crates/mlflow-server/tests/chaos.rs`), asserting no unexpected 5xx and
  # dense/unique model-version numbers under a `MAX(version)+1` race. Too heavy
  # for the PR path, so — unlike every other job here — it runs ONLY on the
  # nightly `schedule` and manual `workflow_dispatch`, never on push/PR. The
  # test skips itself when `MLFLOW_RUST_TEST_PG_URI` is unset, so it never runs
  # in the PR-path `test` job even though it lives in the same crate.
  chaos:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mlflow
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U mlflow -d mlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: rust
      - uses: ./.github/actions/setup-python
      - name: Provision schema (mlflow db upgrade)
        working-directory: .
        env:
          DB_URI: postgresql://mlflow:mlflow@localhost:5432/mlflow
        run: uv run --extra db mlflow db upgrade "$DB_URI"
      - name: Run chaos soak against live Postgres
        env:
          MLFLOW_RUST_TEST_PG_URI: postgresql://mlflow:mlflow@localhost:5432/mlflow
        run: cargo test -p mlflow-server --test chaos -- --nocapture
